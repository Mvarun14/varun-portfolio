    <title>Phani Varun — Security Engineer</title>
    <meta name="description" content="Security Engineer across the US and India, fluent in Application Security, GenAI, and Backend Systems." />

    <!--
      Security headers — Content-Security-Policy is injected only in
      production via vite.config.js (Vite dev HMR uses inline modules that
      need a looser policy). Hosting platforms should also serve these
      as real HTTP response headers when available.
    -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="color-scheme" content="light" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
